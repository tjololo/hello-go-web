name: Go test

on:
  push:
    branches-ignore:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod

    - name: Lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        version: v2.12.2

    - name: Build
      run: go build -v .

    - name: Test
      run: go test -v .

    - name: GoVulncheck
      uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
      with:
        go-version-file: go.mod
        repo-checkout: false
    - name: Docker build
      id: docker_build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        push: false
        load: true
        tags: ${{ github.repository }}:test

    - name: Run Docker integration test
      run: |
        docker run -d --name hello-test -p 8080:8080 ${{ github.repository }}:test
        timeout 15 sh -c 'until curl -sf http://localhost:8080/hello | grep -q "response"; do sleep 1; done'

    - name: Remove test container
      if: always()
      run: docker rm -f hello-test