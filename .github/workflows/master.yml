name: Go test docker build

on:
  push:
    branches:
      - main

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod

    - name: Lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        version: v2.12.2

    - name: Build
      run: go build -v .

    - name: Test
      run: go test -v .
    - name: GoVulncheck
      uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
      with:
        go-version-file: go.mod
        repo-checkout: false
    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Login to DockerHub
      uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        push: true
        load: true
        tags: ghcr.io/${{ github.repository }}:latest
    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}

    - name: Run Docker integration test
      run: |
        docker run -d --name hello-test -p 8080:8080 ghcr.io/${{ github.repository }}:latest
        timeout 15 sh -c 'until curl -sf http://localhost:8080/hello | grep -q "response"; do sleep 1; done'

    - name: Remove test container
      if: always()
      run: docker rm -f hello-test
